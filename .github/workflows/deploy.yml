name: Continuous Integration & Container Verification

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Clone Repository Workspace
      uses: actions/checkout@v4

    - name: 2. Set Up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 3. Authenticate with Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 4. Build and Push Container Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/shuriai-studio:latest